version: 1.0

author: YOUR_NAME_HERE

editor: "code {{ .Filename }}"

# How to generate the destination filename.
filename:
  rules:
    - site: codeforces.com
      regex: "(?:problemset/problem|contest)/(\\d+)(?:/problem)?/([A-Za-z0-9]+)"
      template: './src/bin/{{ index .Captures 1 }}-{{ index .Captures 2 }}-{{ .Title | stripPrefix "."  | toKebabCase }}.rs'

    - site: atcoder.jp
      regex: "contests/([^/]+)/tasks/([^_]+)_([a-z]+)"
      template: './src/bin/{{ index .Captures 2 }}-{{ index .Captures 3 | toLowerCase }}{{if gt (.Title | stripPrefix "-" | len) 0}}-{{ .Title | stripPrefix "-"  | toKebabCase }}{{- end -}}.rs'

    - site: cses.fi
      regex: "problemset/task/(\\d+)/?$"
      template: './src/bin/cses-{{ index .Captures 1 }}-{{ .Title | toKebabCase }}.rs'

    - site: judge.u-aizu.ac.jp
      regex: "description\\.jsp\\?id=([A-Za-z0-9_]+)"
      template: './src/bin/aoj-{{ index .Captures 1 }}-{{ .Title | toKebabCase }}.rs'

    - site: open.kattis.com
      regex: "problems/([^/?]+)/?"
      template: "./src/bin/{{ index .Captures 1 }}.rs"

# Base source template.
template:
  source: ./src/main.rs
  modifier: |
    // Created by {{ .Author }} at {{ .Time }} 
    // {{ .Url }} 
    {{ .Code }}

# Optional code post-processing.
code:
  modifier: |
    {{ .Code }}
    
    {{ range .LibFiles }}
    
    mod {{ .Name }} {
      {{ .Content }}
    }
    
    {{end}}

# Library injection.
lib:
  regex: "use\\s*(super::)?{{.Name}}(::|;)"
  include:
    _: "./src/lib/"

# Compilation.
compiler:
  name: Rust
  source: main.rs
  compile: rustc # empty if no compilation to be performed
  args:
    - --edition=2024
    - -O
    - main.rs
  run: ./main

# Behaviour
create_file: true
run_on_save: true
